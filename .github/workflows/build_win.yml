name: Windows Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-2022

    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      shell: cmd
      run: |
        git clone https://github.com/microsoft/vcpkg
        cd vcpkg
        git checkout 58aac5dacbe95290264695bb3f129305eeb66780 -- ports/protobuf
        vcpkg install protobuf protobuf:x64-windows
      
    - name: Copy over the files
      shell: cmd
      run: |
        mkdir upload
        mkdir upload\bin
        mkdir upload\include
        mkdir upload\include\google
        mkdir upload\lib
        mkdir upload\share
        copy /y /v C:\vcpkg\installed\x64-windows\tools\protobuf\protoc.exe upload\bin
        xcopy /y /v /s /e C:\vcpkg\installed\x64-windows\include\google upload\include\google
        copy /y /v C:\vcpkg\installed\x64-windows\lib\lib*.lib upload\lib
        copy /y /v C:\vcpkg\installed\x64-windows\debug\lib\lib*.lib upload\lib
        copy /y /v C:\vcpkg\installed\x64-windows\share\protobuf\*.* upload\share

    - name: Generate C++ files
      shell: cmd
      run: |
        mkdir upload\cpp-files
        C:\vcpkg\installed\x64-windows\tools\protobuf\protoc.exe --cpp_out=upload\cpp-files widevine_protocol.proto
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-artifact
        path: ${{github.workspace}}/upload
        if-no-files-found: ignore
        include-hidden-files: true
        retention-days: 0
        
    - name: Upload package artifact
      uses: actions/upload-artifact@v4
      with:
        name: Package-artifact
        path: C:\vcpkg\packages\protobuf_x64-windows
        if-no-files-found: ignore
        include-hidden-files: true
        retention-days: 0
